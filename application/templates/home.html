{% extends "layout.html" %}

{% block title %}首頁{% endblock %}

{% block main %}
<div class="container py-5 mt-5">
    <div class="text-center py-5">
        <div class="avatar-wrapper mx-auto mb-4" style="width: 140px; height: 140px; border-radius: 50%; overflow: hidden; border: 4px solid var(--card-bg); background-color: var(--bg-secondary); box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
            <img src="{{ url_for('static', filename='images/avatar.png') }}" alt="邱湘婷" class="w-100 h-100 object-fit-cover" onerror="this.src='https://via.placeholder.com/150/E6E4DE/3A403F?text=Sting'">
        </div>
        <h1 class="fw-bold display-4 mb-3" style="color: var(--text-primary); letter-spacing: 1px;">邱湘婷</h1>
        <p class="lead text-muted mx-auto mb-5" style="max-width: 600px; line-height: 1.8;">
            自學但還沒成材的研究生？<br>
            在實驗室這個結構性行政黑洞裡，現在是別人口中的<strong>邱助理</strong>。
        </p>
        <a href="{{ url_for('about') }}" class="btn btn-morandi">探索我的研究世界</a>
    </div>
</div>
{% endblock %}
