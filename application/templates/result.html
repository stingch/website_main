{% extends "layout.html" %}

{% block title %}
    傳送結果
{% endblock %}

{% block main %}
    <div class="container response py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="section-title">傳送完成</h2>
                <div class="card card-morandi message-card text-center p-5 border-0">
                    <p class="lead" style="color: var(--text-primary);">感謝您嘗試聯絡我！</p>
                    <p class="text-secondary" style="font-size: 1rem; line-height: 1.6;">本信件系統已發送模擬封包。若需要直接取得聯繫，歡迎點擊下方按鈕或透過電子郵件與我聯絡。</p>
                    <div class="mt-4">
                        <a href="{{ url_for('contact') }}" class="btn btn-morandi text-decoration-none">返回聯絡頁面</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
