<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <title>{% block title %}{% endblock %} | Sting Chiou</title>
</head>
<body style="padding-top: 100px; padding-bottom: 80px;">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-md fixed-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">TING CHIOU.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('home')) }}" href="{{ url_for('home') }}">首頁</a></li>
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('about')) }}" href="{{ url_for('about') }}">關於我</a></li>
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('skills')) }}" href="{{ url_for('skills') }}">技術與研究</a></li>
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('portfolio')) }}" href="{{ url_for('portfolio') }}">作品專案</a></li>
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('chat')) }}" href="{{ url_for('chat') }}">AI Assistant</a></li>
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('image_gen')) }}" href="{{ url_for('image_gen') }}">AI Image</a></li>
                    <li class="nav-item"><a class="nav-link me-3 {{ request.path | is_active(url_for('contact')) }}" href="{{ url_for('contact') }}">聯絡通訊</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main>
        {% block main %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 mt-5" style="background-color: var(--text-primary); color: var(--bg-primary); font-size: 0.85rem;">
        <p class="m-0">&copy; 2026 邱湘婷 Sting Chiou. 保持自學，在學術的黑洞中持續掙扎。</p>
    </footer>

</body>
</html>
